<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming in Future Seasons — The Globe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0a07; --parchment:#f5edd8; --gold:#c9923a; --gold-light:#e8b96a;
  --crimson:#7a1c24; --crimson-light:#a02535;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--ink);font-family:'EB Garamond',serif;color:var(--parchment);}

/* ---- CURTAIN SCENE ---- */
.stage{
  position:relative;width:100%;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Dark stage floor gradient */
.stage-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 100%, #2a1a08 0%, #0d0a07 60%),
    radial-gradient(ellipse at 50% 0%, #1a0d0a 0%, transparent 70%);
}

/* Stage spotlight */
.spotlight{
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:600px;height:500px;
  background:radial-gradient(ellipse at 50% 100%, rgba(201,146,58,.18) 0%, transparent 70%);
  pointer-events:none;
}

/* LEFT CURTAIN */
.curtain-left{
  position:absolute;top:0;left:0;
  width:38%;height:100%;
  background:
    linear-gradient(to right,
      #3a0a0a 0%,
      #6b1212 25%,
      #8b1a1a 45%,
      #7a1515 60%,
      #5a0e0e 80%,
      #3a0808 100%
    );
  transform-origin:top left;
  /* Folds / pleats via repeating gradient overlay */
  overflow:hidden;
  box-shadow: inset -20px 0 40px rgba(0,0,0,.5), 8px 0 30px rgba(0,0,0,.6);
}
.curtain-left::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    to right,
    rgba(0,0,0,.25) 0px, rgba(0,0,0,.0) 18px,
    rgba(255,255,255,.04) 22px, rgba(0,0,0,.0) 36px,
    rgba(0,0,0,.2) 38px, rgba(0,0,0,.0) 56px,
    rgba(255,255,255,.03) 60px, rgba(0,0,0,.0) 76px,
    rgba(0,0,0,.18) 80px, rgba(0,0,0,.0) 96px
  );
}
/* Curtain sway animation */
@keyframes swayLeft{
  0%,100%{transform:skewY(0deg) scaleX(1);}
  50%{transform:skewY(.4deg) scaleX(1.005);}
}
.curtain-left{animation:swayLeft 8s ease-in-out infinite;}

/* RIGHT CURTAIN */
.curtain-right{
  position:absolute;top:0;right:0;
  width:38%;height:100%;
  background:
    linear-gradient(to left,
      #3a0a0a 0%,
      #6b1212 25%,
      #8b1a1a 45%,
      #7a1515 60%,
      #5a0e0e 80%,
      #3a0808 100%
    );
  overflow:hidden;
  box-shadow: inset 20px 0 40px rgba(0,0,0,.5), -8px 0 30px rgba(0,0,0,.6);
}
.curtain-right::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    to left,
    rgba(0,0,0,.25) 0px, rgba(0,0,0,.0) 18px,
    rgba(255,255,255,.04) 22px, rgba(0,0,0,.0) 36px,
    rgba(0,0,0,.2) 38px, rgba(0,0,0,.0) 56px,
    rgba(255,255,255,.03) 60px, rgba(0,0,0,.0) 76px,
    rgba(0,0,0,.18) 80px, rgba(0,0,0,.0) 96px
  );
}
@keyframes swayRight{
  0%,100%{transform:skewY(0deg) scaleX(1);}
  50%{transform:skewY(-.4deg) scaleX(1.005);}
}
.curtain-right{animation:swayRight 8s ease-in-out infinite 0.5s;}

/* Gold fringe at bottom of each curtain */
.curtain-left::after,.curtain-right::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:60px;
  background:repeating-linear-gradient(
    to right,
    var(--gold) 0px, var(--gold) 4px,
    transparent 4px, transparent 10px
  );
  opacity:.7;
}

/* Pelmet / valance at top */
.pelmet{
  position:absolute;top:0;left:0;right:0;
  height:90px;z-index:10;
  background:linear-gradient(to bottom, #2a0808 0%, #6b1010 50%, #3a0808 100%);
  box-shadow:0 8px 30px rgba(0,0,0,.7);
}
.pelmet::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:20px;
  background:repeating-linear-gradient(
    to right,
    var(--gold) 0px, var(--gold) 4px,
    transparent 4px, transparent 12px
  );
  opacity:.8;
}
/* Pelmet decorative arch */
.pelmet-arch{
  position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);
  width:300px;height:60px;
  border:3px solid rgba(201,146,58,.6);
  border-top:none;
  border-radius:0 0 150px 150px;
  pointer-events:none;
}

/* ---- THE SIGN ---- */
.sign-wrap{
  position:relative;z-index:20;
  display:flex;flex-direction:column;
  align-items:center;gap:32px;
  text-align:center;
  padding:20px;
  animation:signDrop 1.2s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity:0;
}
@keyframes signDrop{
  0%{opacity:0;transform:translateY(-60px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Rope from sign to pelmet */
.sign-rope{
  width:2px;height:60px;
  background:linear-gradient(to bottom, rgba(201,146,58,.8), rgba(201,146,58,.4));
  margin-bottom:-20px;
}

.sign-board{
  background:linear-gradient(135deg, #2a1a08, #1e1208, #2a1a08);
  border:3px solid var(--gold);
  padding:36px 52px;
  position:relative;
  box-shadow:
    0 0 0 1px rgba(201,146,58,.2),
    0 8px 40px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(201,146,58,.2);
}
/* Corner ornaments */
.sign-board::before,.sign-board::after{
  content:'✦';
  position:absolute;
  color:var(--gold);font-size:1rem;opacity:.6;
}
.sign-board::before{top:10px;left:14px;}
.sign-board::after{bottom:10px;right:14px;}
.sign-corner-tr,.sign-corner-bl{
  position:absolute;color:var(--gold);font-size:1rem;opacity:.6;
}
.sign-corner-tr{top:10px;right:14px;}
.sign-corner-bl{bottom:10px;left:14px;}

.sign-eyebrow{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.6em;
  color:var(--gold);text-transform:uppercase;margin-bottom:16px;opacity:.8;
}
.sign-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.4rem,4vw,2.8rem);
  font-weight:900;
  color:var(--parchment);
  line-height:1.15;
  text-shadow:0 0 40px rgba(201,146,58,.3);
  margin-bottom:16px;
}
.sign-title span{color:var(--gold);}
.sign-sub{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:clamp(.95rem,2vw,1.2rem);
  color:var(--parchment);opacity:.7;
  max-width:420px;line-height:1.7;
}
.sign-divider{
  width:120px;height:1px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
  margin:16px auto;
}

.back-link{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;
  color:var(--gold);text-decoration:none;text-transform:uppercase;
  border:1px solid rgba(201,146,58,.4);padding:12px 28px;
  transition:all .3s;display:inline-block;margin-top:8px;
}
.back-link:hover{background:rgba(201,146,58,.1);border-color:var(--gold);}
</style>
</head>
<body>
<div class="stage">
  <div class="stage-bg"></div>
  <div class="spotlight"></div>

  <!-- Pelmet / top valance -->
  <div class="pelmet">
    <div class="pelmet-arch"></div>
  </div>

  <!-- Left curtain -->
  <div class="curtain-left"></div>
  <!-- Right curtain -->
  <div class="curtain-right"></div>

  <!-- The sign hanging centre stage -->
  <div class="sign-wrap">
    <div class="sign-rope"></div>
    <div class="sign-board">
      <span class="sign-corner-tr">✦</span>
      <span class="sign-corner-bl">✦</span>
      <p class="sign-eyebrow">The Globe Theatre presents</p>
      <h1 class="sign-title">Coming in<br><span>Future Seasons</span></h1>
      <div class="sign-divider"></div>
      <p class="sign-sub">More plays are in rehearsal. Return to the theatre to see what is currently on stage.</p>
      <div style="margin-top:28px;">
        <a href="index.html" class="back-link">← Return to The Globe</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
